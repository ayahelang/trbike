<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRBike</title>

    <!-- LEAFLET CSS (WAJIB DI ATAS) -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://silverhawk.web.id/lock/lock.css">

    <!-- LEAFLET JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  </head>
  <body>
    <div class="header">
      <h1>🛵 TRBike</h1>
      <p class="sub">Transportasi adil & manusiawi</p>
    </div>

    <div id="map"></div>

    <div class="bottom-sheet">
      <div class="sheet-content">
        <h3 id="statusText">Siap memesan</h3>
        <p id="infoText">Tekan tombol untuk mencari driver</p>
      </div>

      <button class="order-btn" onclick="orderRide()">Pesan TRBike</button>
      <button onclick="cancelRide()" class="order-btn" style="background: red">
        Batalkan
      </button>
    </div>

    <script src="script.js"></script>
    <script src="https://silverhawk.web.id/lock/lock.js"></script>
  </body>
</html>
